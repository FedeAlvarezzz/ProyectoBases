
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Medicamento - Sistema Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: rgba(64, 58, 62, 0.85);
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            z-index: -1;
        }

        h1 {
            color: #ff4081;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-label {
            color: #333;
        }

        .form-container {
            background-color: #ffffffee;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background-color: #ff4081;
            border-color: #ff4081;
        }

        .container {
            max-width: 680px;
            margin-top: 50px;
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
<div th:replace="~{fragmentos :: barraNavegacion}"></div>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">
                        <i class="fas fa-eye me-2"></i>
                        Ver Medicamento
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/medicamentos/editar}" th:object="${medicamento}" method="post">
                        <input type="hidden" th:field="*{idMedicamento}">

                        <div class="mb-3">
                            <label for="codigoMedicamento" class="form-label">
                                <i class="fas fa-barcode me-1"></i>
                                Código del Medicamento
                            </label>
                            <input type="text" class="form-control" id="codigoMedicamento"
                                   th:value="${medicamento.idMedicamento}" disabled>
                            <small class="form-text text-muted">El código no puede ser modificado</small>
                        </div>
                        <div class="mb-3">
                            <label for="nombre" class="form-label">
                                <i class="fas fa-pills me-1"></i>
                                Nombre del Medicamento
                            </label>
                            <input type="text" class="form-control" id="nombre"
                                   th:value="${medicamento.nombreMedicamento}" disabled>
                            <small class="form-text text-muted">Nombre del medicamento</small>
                        </div>
                        <div class="mb-3">
                            <label for="frecuencia" class="form-label">
                                <i class="fas fa-capsules me-1"></i>
                                Frecuencia
                            </label>
                            <input type="text" class="form-control" id="frecuencia"
                                   th:value="${medicamento.frecuencia}" disabled>
                            <small class="form-text text-muted">Frecuencia del medicamento</small>
                        </div>
                        <div class="mb-3">
                            <label for="dosis" class="form-label">
                                <i class="fas fa-syr inge me-1"></i>
                                Dosis
                            </label>
                            <input type="text" class="form-control" id="dosis"
                                   th:value="${medicamento.dosis}" disabled>
                            <small class="form-text text-muted">Dosis recomendada del medicamento</small>
                        </div>

</html>
